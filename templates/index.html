<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Factory Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid #2d3748;
      background: #1a1f2e;
      gap: 12px;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #68d391; }

    #model-badge {
      font-size: 0.72rem;
      background: #2d3748;
      border-radius: 999px;
      padding: 2px 10px;
      color: #a0aec0;
      white-space: nowrap;
    }

    .think-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #a0aec0;
      cursor: pointer;
      user-select: none;
    }

    .think-toggle input[type="checkbox"] {
      accent-color: #68d391;
      width: 15px; height: 15px;
      cursor: pointer;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.6;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #2d3748;
      color: #fbd38d;
    }

    .msg.agent {
      align-self: flex-start;
      background: #1a2535;
      color: #e2e8f0;
      border: 1px solid #2d3748;
    }

    .msg.agent.streaming::after {
      content: "▍";
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .msg.error { background: #3d1515; border-color: #e53e3e; color: #fc8181; }

    footer {
      padding: 14px 20px;
      border-top: 1px solid #2d3748;
      background: #1a1f2e;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 0.9rem;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      overflow-y: auto;
      outline: none;
    }

    #input:focus { border-color: #68d391; }

    #send {
      background: #2f855a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
      height: 44px;
    }

    #send:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }
    #send:not(:disabled):hover { background: #276749; }
  </style>
</head>
<body>

<header>
  <h1>🏭 Smart Factory Agent</h1>
  <span id="model-badge">loading model…</span>
  <label class="think-toggle">
    <input type="checkbox" id="think-toggle" />
    Thinking mode
  </label>
</header>

<div id="messages"></div>

<footer>
  <textarea id="input" rows="1" placeholder="Ask about factory operations…"></textarea>
  <button id="send">Send</button>
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');
  const thinkChk   = document.getElementById('think-toggle');
  const modelBadge = document.getElementById('model-badge');

  // conversation history sent to /chat
  const history = [{ role: 'system', content: {{ system_prompt | tojson }} }];

  // Fetch and display model name
  fetch('/models').then(r => r.json()).then(d => {
    modelBadge.textContent = d.model.split('/').pop();
  }).catch(() => { modelBadge.textContent = 'unknown model'; });

  function appendMsg(role, text) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = '';
    sendBtn.disabled = true;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    const agentEl = appendMsg('agent', '');
    agentEl.classList.add('streaming');

    let reply = '';

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          enable_thinking: thinkChk.checked,
        }),
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() ?? '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;

          const parsed = JSON.parse(raw);
          if (parsed.error) {
            agentEl.classList.add('error');
            agentEl.textContent = `Error: ${parsed.error}`;
            return;
          }
          if (parsed.token) {
            reply += parsed.token;
            agentEl.textContent = reply;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        }
      }

      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      agentEl.classList.add('error');
      agentEl.textContent = `Connection error: ${err.message}`;
    } finally {
      agentEl.classList.remove('streaming');
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = '';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });
</script>
</body>
</html>
